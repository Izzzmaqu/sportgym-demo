<!--
  APP SHELL � Estructura principal de la aplicacion
  ===================================================
  Este template define el "esqueleto" visual del sitio.
  Todo el contenido de las paginas se inyecta dentro de <router-outlet>.

  ESTRUCTURA:
  +-------------------------------------+
  |  <app-navbar> (fijo en la cima)     |
  +-------------------------------------+
  |  <main> (contenido de cada pagina)  |
  |    <router-outlet />                |
  +-------------------------------------+
  |  <app-footer>                       |
  +-------------------------------------+
  [<app-whatsapp-button> flotante]
-->

<app-navbar />

<!--
  min-height: 100vh en main es la clave del CLS fix:
  El navbar es position:fixed (fuera del flujo del documento).
  Sin min-height, cuando Angular carga y el router-outlet aun esta vacio
  (esperando el lazy chunk de la pagina), el footer aparece casi al inicio
  del documento. Cuando el chunk carga y llena el main, el footer salta al
  fondo — eso es el CLS 0.922.
  Con min-height:100vh, el main siempre ocupa la pantalla completa aunque
  este vacio, el footer queda fuera del viewport y no causa shift.
-->
<main id="main-content" role="main" style="min-height:100vh">
  <router-outlet />
</main>

<app-footer />

<!--
  app-whatsapp-button: Boton flotante de WhatsApp.
  Posicionado de forma fija (fixed) en la esquina inferior derecha.
  Disponible en todas las paginas gracias a estar en el shell.
-->
<app-whatsapp-button />
