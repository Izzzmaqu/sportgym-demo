<!--
  APP SHELL — Estructura principal de la aplicacion
  ===================================================
  Este template define el "esqueleto" visual del sitio.
  Todo el contenido de las paginas se inyecta dentro de <router-outlet>.

  ESTRUCTURA:
  +-------------------------------------+
  |  <app-navbar> (fijo en la cima)     |
  +-------------------------------------+
  |  <main> (contenido de cada pagina)  |
  |    <router-outlet />                |
  +-------------------------------------+
  |  <app-footer>                       |
  +-------------------------------------+
  [<app-whatsapp-button> flotante]
-->

<!--
  app-navbar: El componente navbar se renderiza aqui y es visible
  en TODAS las paginas, independientemente de la ruta activa.
-->
<app-navbar />

<!--
  <main>: Elemento semantico HTML5 que delimita el contenido principal.
  id="main-content": El skip-to-content link del navbar apunta a este id,
  permitiendo a usuarios de teclado saltar directamente al contenido.
  role="main": Redundante con <main> pero mejora compatibilidad con
  lectores de pantalla mas antiguos.
-->
<main id="main-content" role="main">
  <!--
    router-outlet: Aqui Angular inyecta el componente de la pagina activa.
    Cuando el usuario navega a "/servicios", Angular carga lazily
    ServicesComponent y lo renderiza en este lugar.
  -->
  <router-outlet />
</main>

<!--
  app-footer: Pie de pagina visible en todas las paginas.
-->
<app-footer />

<!--
  app-whatsapp-button: Boton flotante de WhatsApp.
  Posicionado de forma fija (fixed) en la esquina inferior derecha.
  Disponible en todas las paginas gracias a estar en el shell.
-->
<app-whatsapp-button />
